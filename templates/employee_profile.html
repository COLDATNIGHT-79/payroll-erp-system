{% extends "base.html" %}

{% block content %}
<!-- HEADER -->
<div class="mb-4 pb-2 border-b border-[#e0d8c8]">
    <h1 class="text-2xl font-medium tracking-tight text-[#2b4222]">
        My Profile
    </h1>
    <p class="text-[#5c5c5c] text-xs uppercase tracking-wider mt-1">
        Your Personal Information
    </p>
</div>

<div class="bg-white p-6 border border-[#e0d8c8] rounded-none max-w-md space-y-4">
    <h2 class="text-sm uppercase tracking-wider text-gray-500 mb-4 border-b border-[#e0d8c8] pb-2">Profile Details</h2>
    <p class="text-sm text-[#5c5c5c]"><strong>Name:</strong> {{ profile_title }}</p>
    <p class="text-sm text-[#5c5c5c]"><strong>Designation:</strong> {{ profile_role }}</p>
    <p class="text-sm text-[#5c5c5c]"><strong>Employee ID:</strong> {{ profile_id }}</p>
    <p class="text-sm text-[#5c5c5c]"><strong>Department:</strong> {{ profile_department }}</p>
</div>
{% endblock %}
