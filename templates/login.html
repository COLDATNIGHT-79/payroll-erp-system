<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
body {
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background: #faf6f0; /* Paper-like background */
    font-family: 'Inter', sans-serif;
    margin: 0;
}

.card {
    padding:40px;
    width:380px;
    border-radius:16px;
    box-shadow: 0 10px 30px rgba(43, 66, 34, 0.08);
    background: #fffcf7;
    border: 1px solid #e0d8c8;
    animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

@keyframes popIn {
    0% { transform: scale(0.9); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
}

h3 {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    color: #2b4222;
    margin-bottom: 24px !important;
}

label {
    font-weight: 500;
    color: #5c5c5c;
    font-size: 14px;
    margin-bottom: 6px;
    display: block;
}

.form-control {
    background: #faf6f0;
    border: 1px solid #d4cebe;
    border-radius: 8px;
    padding: 10px 14px;
    transition: all 0.3s ease;
}

.form-control:focus {
    box-shadow: 0 0 0 3px rgba(244, 162, 97, 0.3);
    border-color: #f4a261;
    background: #ffffff;
    outline: none;
}

button {
    width:100%;
    margin-top: 10px;
    padding: 10px;
    font-weight: 600 !important;
    border-radius: 8px !important;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1) !important;
}

.btn-primary {
    background-color: #3a5a40 !important;
    border-color: #3a5a40 !important;
    color: white !important;
    box-shadow: 0 4px 10px rgba(58, 90, 64, 0.3) !important;
}

.btn-primary:hover, .btn-primary:focus, .btn-primary:active {
    background-color: #2b4222 !important;
    border-color: #2b4222 !important;
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(58, 90, 64, 0.4) !important;
}
</style>

</head>

<body>

<div class="card">

<h3 class="text-center mb-4">ERP Login</h3>

<form method="POST">
{% csrf_token %}

<label>Username</label>
<input type="text" name="username" class="form-control mb-3">

<label>Password</label>
<input type="password" name="password" class="form-control mb-3">

<button type="submit" class="btn btn-primary">Login</button>

</form>

{% if error %}
<p style="color:red; margin-top:10px;">{{ error }}</p>
{% endif %}

</div>

</body>
</html>
